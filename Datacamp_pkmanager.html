<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DATACAMP - PK Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --primary: #e63946; --accent: #457b9d; --text: #f1faee; --success: #2a9d8f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        /* Header & Tabs */
        header { background: var(--card); padding: 15px; text-align: center; border-bottom: 2px solid var(--primary); sticky: top; }
        .tabs { display: flex; background: #000; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; color: #666; transition: 0.3s; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: #1a1a1a; }

        /* Pantalles */
        .view { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Mode Gravació */
        .odo-container { text-align: center; margin-bottom: 30px; background: #000; padding: 20px; border-radius: 20px; border: 1px solid #333; }
        .odo-val { font-size: 3.5rem; font-weight: bold; font-family: monospace; color: var(--primary); }
        .odo-lbl { font-size: 0.8rem; color: #888; letter-spacing: 2px; }
        
        .input-group { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        input { background: #333; border: 1px solid #444; color: white; padding: 12px; border-radius: 5px; width: 80%; margin: 5px 0; font-size: 1rem; }
        
        .btn-main { background: var(--primary); color: white; border: none; padding: 25px; border-radius: 15px; width: 100%; font-size: 1.5rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(230, 57, 70, 0.3); }
        .btn-main:active { transform: scale(0.98); background: #b02a33; }

        /* Llistat de Targetes */
        .road-section { margin-bottom: 40px; }
        .road-title { color: var(--primary); border-left: 4px solid var(--primary); padding-left: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .pk-card { background: var(--card); margin-bottom: 8px; padding: 15px; border-radius: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #333; cursor: grab; }
        .pk-info { display: flex; flex-direction: column; }
        .pk-num { font-size: 1.2rem; font-weight: bold; }
        .pk-coords { font-size: 0.7rem; color: #888; font-family: monospace; }
        .pk-actions button { background: none; border: none; color: #666; font-size: 1.2rem; padding: 5px; cursor: pointer; }
        .pk-actions .del:hover { color: var(--primary); }

        .handle { color: #444; margin-right: 15px; cursor: grab; font-size: 1.5rem; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0; letter-spacing: 1px;">DATACAMP <span style="font-weight:100;">PK MANAGER</span></h2>
</header>

<div class="tabs">
    <div class="tab active" onclick="showTab('rec')">GRAVACIÓ</div>
    <div class="tab" onclick="showTab('hist')">HISTORIAL</div>
</div>

<div id="view-rec" class="view active">
    <div class="odo-container">
        <div class="odo-lbl">METRES DES DE L'ÚLTIM PK</div>
        <div class="odo-val" id="display-metres">0</div>
        <div id="display-speed" style="color:var(--success); font-weight:bold;">0 km/h</div>
    </div>

    <div class="input-group">
        <label>Carretera</label><br>
        <input type="text" id="input-road" placeholder="Ex: C-55" oninput="updateSequence()">
        <br><br>
        <label>Següent PK a marcar</label><br>
        <input type="number" id="input-next-pk" placeholder="Ex: 12">
    </div>

    <button class="btn-main" onclick="markPK()">MARCAR PK</button>
    <p id="status-gps" style="text-align:center; font-size:0.8rem; color:#666; margin-top:15px;">Esperant GPS...</p>
</div>

<div id="view-hist" class="view">
    <div id="roads-container">
        </div>
    <button class="btn-main" style="background:var(--success); margin-top:20px;" onclick="exportJSON()">EXPORTAR TOTES LES RUTES</button>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('dc_pks')) || {};
    let lastCoords = null;
    let distSinceLastPK = 0;
    let currentRoad = "";

    // Inicialitzar GPS
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            const { latitude, longitude, speed, accuracy } = pos.coords;
            document.getElementById('status-gps').innerText = `GPS OK (±${accuracy.toFixed(1)}m)`;
            document.getElementById('display-speed').innerText = `${speed ? Math.round(speed * 3.6) : 0} km/h`;

            if (lastCoords) {
                let d = calculateDistance(lastCoords.lat, lastCoords.lon, latitude, longitude);
                if (d > 1) distSinceLastPK += d;
            }
            lastCoords = { lat: latitude, lon: longitude };
            document.getElementById('display-metres').innerText = Math.round(distSinceLastPK);
        }, err => console.error(err), { enableHighAccuracy: true });
    }

    function markPK() {
        const road = document.getElementById('input-road').value.trim();
        const pkNum = document.getElementById('input-next-pk').value;

        if (!road || !pkNum) return alert("Emplena carretera i PK");

        if (!db[road]) db[road] = [];

        const newPoint = {
            id: Date.now(),
            pk: parseInt(pkNum),
            lat: lastCoords.lat,
            lon: lastCoords.lon,
            t: new Date().toLocaleTimeString()
        };

        db[road].push(newPoint);
        saveDB();
        
        // Reset odòmetre i següent PK
        distSinceLastPK = 0;
        document.getElementById('input-next-pk').value = parseInt(pkNum) + 1;
        
        if (navigator.vibrate) navigator.vibrate(200);
        renderHistorial();
    }

    function renderHistorial() {
        const container = document.getElementById('roads-container');
        container.innerHTML = "";

        for (let road in db) {
            const section = document.createElement('div');
            section.className = 'road-section';
            section.innerHTML = `
                <div class="road-title">
                    <span>CARRETERA: ${road}</span>
                    <button onclick="deleteRoad('${road}')" style="background:none; border:none; color:var(--primary); cursor:pointer;">Eliminar</button>
                </div>
                <div id="list-${road.replace(/\s/g, '')}" class="pk-list" data-road="${road}"></div>
            `;
            container.appendChild(section);

            const listContainer = document.getElementById(`list-${road.replace(/\s/g, '')}`);
            db[road].forEach(p => {
                const card = document.createElement('div');
                card.className = 'pk-card';
                card.dataset.id = p.id;
                card.innerHTML = `
                    <div style="display:flex; align-items:center;">
                        <span class="handle">≡</span>
                        <div class="pk-info">
                            <span class="pk-num">PK ${p.pk}</span>
                            <span class="pk-coords">${p.lat.toFixed(6)}, ${p.lon.toFixed(6)}</span>
                        </div>
                    </div>
                    <div class="pk-actions">
                        <button onclick="editPK('${road}', ${p.id})">✎</button>
                        <button class="del" onclick="deletePK('${road}', ${p.id})">✕</button>
                    </div>
                `;
                listContainer.appendChild(card);
            });

            // Sortable JS per arrossegar targetes
            new Sortable(listContainer, {
                handle: '.handle',
                animation: 150,
                onEnd: function(evt) {
                    const roadName = evt.from.dataset.road;
                    const items = Array.from(evt.from.querySelectorAll('.pk-card'));
                    const newOrder = items.map(el => {
                        return db[roadName].find(x => x.id == el.dataset.id);
                    });
                    db[roadName] = newOrder;
                    saveDB();
                }
            });
        }
    }

    function deletePK(road, id) {
        if(confirm("Eliminar aquest PK?")) {
            db[road] = db[road].filter(p => p.id !== id);
            saveDB();
            renderHistorial();
        }
    }

    function editPK(road, id) {
        let p = db[road].find(x => x.id == id);
        let nouPK = prompt("Nou número de PK:", p.pk);
        if (nouPK !== null) {
            p.pk = parseInt(nouPK);
            saveDB();
            renderHistorial();
        }
    }

    function deleteRoad(road) {
        if(confirm(`Vols eliminar tota la carretera ${road}?`)) {
            delete db[road];
            saveDB();
            renderHistorial();
        }
    }

    function saveDB() {
        localStorage.setItem('dc_pks', JSON.stringify(db));
    }

    function showTab(tab) {
        document.querySelectorAll('.tab, .view').forEach(el => el.classList.remove('active'));
        document.querySelector(`.tab[onclick*="${tab}"]`).classList.add('active');
        document.getElementById(`view-${tab}`).classList.add('active');
        if (tab === 'hist') renderHistorial();
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const p1 = lat1 * Math.PI/180;
        const p2 = lat2 * Math.PI/180;
        const dp = (lat2-lat1) * Math.PI/180;
        const dl = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    function exportJSON() {
        const blob = new Blob([JSON.stringify(db, null, 2)], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "BIBLIOTECA_PKS_DATACAMP.json";
        a.click();
    }

    window.onload = renderHistorial;
</script>
</body>
</html>
