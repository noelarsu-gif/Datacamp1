<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>DATACAMP - PK-REF PRO</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --primary: #e63946; --accent: #457b9d; --text: #f1faee; --success: #2a9d8f; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        header { background: var(--card); padding: 15px; text-align: center; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 100; }
        
        .tabs { display: flex; background: #000; position: sticky; top: 55px; z-index: 90; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; color: #666; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: #1a1a1a; }

        .view { display: none; padding: 20px; padding-bottom: 150px; }
        .view.active { display: block; }

        .odo-container { text-align: center; margin-bottom: 20px; background: #000; padding: 30px 10px; border-radius: 20px; border: 1px solid #333; }
        .odo-val { font-size: 3.5rem; font-weight: bold; font-family: monospace; color: var(--primary); line-height: 1; }
        
        .input-box { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        input { background: #222; border: 1px solid #444; color: white; padding: 15px; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 1.1rem; margin-bottom: 10px; }
        
        .btn-main { background: var(--primary); color: white; border: none; padding: 20px; border-radius: 15px; width: 100%; font-size: 1.4rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(230, 57, 70, 0.4); }

        .road-group { margin-bottom: 10px; background: #1a1a1a; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        .road-header { padding: 12px 15px; background: var(--card); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .road-info { display: flex; align-items: center; gap: 8px; }
        .arrow-icon { transition: transform 0.3s; color: var(--primary); font-weight: bold; font-size: 0.8rem; }
        
        .pk-list-container { display: none; padding: 10px; }
        .road-group.open .pk-list-container { display: block; }
        .road-group.open .arrow-icon { transform: rotate(90deg); }

        .pk-card { background: #252525; margin-bottom: 8px; padding: 12px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #333; }
        .pk-num { font-size: 1.1rem; font-weight: bold; }
        .drag-handle { padding-right: 15px; color: #555; cursor: grab; font-size: 1.2rem; }
        
        .actions { display: flex; gap: 8px; }
        .actions button { background: none; border: none; color: #888; font-size: 1.1rem; cursor: pointer; padding: 5px; }

        .nav-arrows { position: fixed; right: 15px; bottom: 85px; display: none; flex-direction: column; gap: 10px; z-index: 200; }
        .nav-arrows.visible { display: flex; }
        .nav-btn { background: var(--accent); color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5); opacity: 0.8; }

        #status-gps { position: fixed; bottom: 0; width: 100%; background: #000; font-size: 0.7rem; color: #666; padding: 5px; text-align: center; z-index: 101; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0;">DATACAMP <span style="font-weight:100;">PK-REF</span></h2>
</header>

<div class="tabs">
    <div class="tab active" id="tab-btn-rec" onclick="showTab('rec')">GRAVAR</div>
    <div class="tab" id="tab-btn-hist" onclick="showTab('hist')">BIBLIOTECA</div>
</div>

<div id="view-rec" class="view active">
    <div class="odo-container">
        <div style="font-size:0.7rem; color:#888; letter-spacing:2px;">METRES PARCIALS</div>
        <div class="odo-val" id="display-metres">0</div>
        <div id="display-speed" style="color:var(--success); font-weight:bold;">0 km/h</div>
    </div>
    <div class="input-box">
        <label style="font-size:0.8rem; color:var(--accent);">CARRETERA</label>
        <input type="text" id="input-road" placeholder="Ex: C-55">
        <label style="font-size:0.8rem; color:var(--accent);">SEGÜENT PK</label>
        <input type="number" id="input-next-pk" placeholder="Ex: 10">
    </div>
    <button class="btn-main" onclick="markPK()">MARCAR PK</button>
</div>

<div id="view-hist" class="view">
    <div id="roads-container"></div>
    <div style="margin-top:20px; display: flex; flex-direction: column; gap: 10px;">
        <button class="btn-main" style="background:var(--success); font-size:1rem; padding: 15px;" onclick="exportJSON()">EXPORTAR BIBLIOTECA GLOBAL</button>
        <button class="btn-main" style="background:#444; font-size:1rem; padding: 15px;" onclick="importJSONGlobal()">IMPORTAR BIBLIOTECA GLOBAL</button>
    </div>
</div>

<div id="nav-arrows" class="nav-arrows">
    <button class="nav-btn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">▲</button>
    <button class="nav-btn" onclick="window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'})">▼</button>
</div>

<div id="status-gps">GPS: Esperant senyal...</div>

<script>
    let db = JSON.parse(localStorage.getItem('dc_pk_manager_v2')) || {};
    let lastCoords = null;
    let distSinceLastPK = 0;
    let openRoads = new Set();

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            const { latitude, longitude, speed, accuracy } = pos.coords;
            document.getElementById('status-gps').innerText = `±${accuracy.toFixed(1)}m | ${speed ? Math.round(speed*3.6) : 0} km/h`;
            if (lastCoords) {
                let d = calculateDistance(lastCoords.lat, lastCoords.lon, latitude, longitude);
                if (d > 1) distSinceLastPK += d;
            }
            lastCoords = { lat: latitude, lon: longitude };
            document.getElementById('display-metres').innerText = Math.round(distSinceLastPK);
            document.getElementById('display-speed').innerText = `${speed ? Math.round(speed*3.6) : 0} km/h`;
        }, null, { enableHighAccuracy: true });
    }

    function markPK() {
        const roadInput = document.getElementById('input-road');
        const road = roadInput.value.trim().toUpperCase();
        const pkInput = document.getElementById('input-next-pk');
        const pkNum = pkInput.value;

        if (!road || !pkNum || !lastCoords) return alert("Falten dades");

        if (!db[road]) db[road] = [];
        db[road].push({ id: Date.now(), pk: parseInt(pkNum), lat: lastCoords.lat, lon: lastCoords.lon });
        
        saveData();
        distSinceLastPK = 0;
        
        // Mantenim la carretera i incrementem el PK
        pkInput.value = parseInt(pkNum) + 1;
        
        if (navigator.vibrate) navigator.vibrate(100);
    }

    function renderHistorial() {
        const container = document.getElementById('roads-container');
        container.innerHTML = "";
        const roadKeys = Object.keys(db);
        if (roadKeys.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#555; padding:40px;">Biblioteca buida</div>';
            return;
        }

        roadKeys.forEach(road => {
            const isOpen = openRoads.has(road);
            const group = document.createElement('div');
            group.className = `road-group ${isOpen ? 'open' : ''}`;
            
            const header = document.createElement('div');
            header.className = 'road-header';
            header.onclick = () => toggleRoad(road);
            header.innerHTML = `
                <div class="road-info">
                    <span class="arrow-icon">▶</span>
                    <span style="font-weight:bold;">${road}</span>
                    <span style="font-size:0.7rem; color:#888;">(${db[road].length})</span>
                </div>
                <div class="actions">
                    <button class="btn-rename" title="Editar nom">✎</button>
                    <button class="btn-delete-road" title="Eliminar carretera" style="color:var(--primary)">🗑️</button>
                    <button class="btn-export-road" title="Exportar">📤</button>
                </div>
            `;

            header.querySelector('.btn-rename').onclick = (e) => { e.stopPropagation(); renameRoad(road); };
            header.querySelector('.btn-delete-road').onclick = (e) => { e.stopPropagation(); deleteRoad(road); };
            header.querySelector('.btn-export-road').onclick = (e) => { e.stopPropagation(); exportIndividual(road); };

            const listEl = document.createElement('div');
            listEl.className = 'pk-list-container';
            listEl.id = `list-${road.replace(/\s/g, '')}`;

            db[road].forEach(p => {
                const card = document.createElement('div');
                card.className = 'pk-card';
                card.dataset.id = p.id;
                card.innerHTML = `
                    <div style="display:flex; align-items:center;">
                        <span class="drag-handle">☰</span>
                        <div class="pk-num">PK ${p.pk}</div>
                    </div>
                    <div class="actions">
                        <button class="btn-edit-pk">✎</button>
                        <button class="btn-del-pk">✕</button>
                    </div>
                `;
                card.querySelector('.btn-edit-pk').onclick = (e) => { e.stopPropagation(); editPK(road, p.id); };
                card.querySelector('.btn-del-pk').onclick = (e) => { e.stopPropagation(); deletePK(road, p.id); };
                listEl.appendChild(card);
            });

            group.appendChild(header);
            group.appendChild(listEl);
            container.appendChild(group);

            new Sortable(listEl, {
                handle: '.drag-handle', animation: 150,
                onEnd: () => {
                    const ids = Array.from(listEl.querySelectorAll('.pk-card')).map(el => el.dataset.id);
                    db[road] = ids.map(id => db[road].find(x => x.id == id));
                    saveData();
                }
            });
        });
    }

    function toggleRoad(road) {
        if (openRoads.has(road)) openRoads.delete(road);
        else openRoads.add(road);
        renderHistorial();
    }

    function renameRoad(oldName) {
        let newName = prompt("Nou nom per a la carretera:", oldName);
        if (newName && newName.trim() !== "" && newName.toUpperCase() !== oldName) {
            newName = newName.trim().toUpperCase();
            db[newName] = db[oldName];
            delete db[oldName];
            if (openRoads.has(oldName)) {
                openRoads.delete(oldName);
                openRoads.add(newName);
            }
            saveData();
            renderHistorial();
        }
    }

    function deleteRoad(road) {
        if (confirm(`Vols eliminar TOTA la carretera ${road}?`)) {
            delete db[road];
            openRoads.delete(road);
            saveData();
            renderHistorial();
        }
    }

    function editPK(road, id) {
        let p = db[road].find(x => x.id == id);
        let nou = prompt("Editar número de PK:", p.pk);
        if (nou !== null && nou !== "") {
            p.pk = parseInt(nou);
            saveData();
            renderHistorial();
        }
    }

    function deletePK(road, id) {
        if(confirm("Eliminar punt?")) {
            db[road] = db[road].filter(x => x.id !== id);
            saveData();
            renderHistorial();
        }
    }

    function exportIndividual(road) {
        const data = { carretera: road, puntos: db[road] };
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `PK_${road}.json`;
        a.click();
    }

    function saveData() { localStorage.setItem('dc_pk_manager_v2', JSON.stringify(db)); }

    function showTab(tab) {
        document.querySelectorAll('.tab, .view').forEach(el => el.classList.remove('active'));
        document.getElementById(`tab-btn-${tab}`).classList.add('active');
        document.getElementById(`view-${tab}`).classList.add('active');
        const arrows = document.getElementById('nav-arrows');
        if (tab === 'hist') { arrows.classList.add('visible'); renderHistorial(); }
        else arrows.classList.remove('visible');
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const p1 = lat1 * Math.PI/180, p2 = lat2 * Math.PI/180;
        const dp = (lat2-lat1) * Math.PI/180, dl = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    function exportJSON() {
        const blob = new Blob([JSON.stringify(db, null, 2)], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "BIBLIOTECA_GLOBAL_PKS.json";
        a.click();
    }

    function importJSONGlobal() {
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => {
                try { db = JSON.parse(ev.target.result); saveData(); renderHistorial(); }
                catch(e) { alert("Error al llegir el fitxer"); }
            };
            reader.readAsText(e.target.files[0]);
        };
        input.click();
    }

    window.onload = () => { showTab('rec'); };
</script>
</body>
</html>
